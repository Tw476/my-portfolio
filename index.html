<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Name | Web Designer</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f0f0f;
      color: #fff;
    }

    header {
      text-align: center;
      padding: 80px 20px;
    }

    header h1 {
      font-size: 2.5rem;
    }

    header p {
      color: #aaa;
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 28px;
      background: #25D366;
      color: #000;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
    }

    .section {
      padding: 50px 20px;
      text-align: center;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 15px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <h1>Your Name</h1>
  <p>I create simple and clean websites for businesses</p>
  <a class="btn" href="https://wa.me/2348104486235">Hire Me</a>
</header>

<section class="section">
  <h2>My Work</h2>
  <div class="projects">

    <div class="card">
      <h3>Barber Website</h3>
      <p>A modern website for a barbing salon.</p>
      <a href="PASTE-YOUR-VERCEL-LINK-HERE" target="_blank">View Project</a>
    </div>

  </div>
</section>

<section class="section">
  <h2>What I Offer</h2>
  <p>Landing pages, business websites, and simple online solutions to help businesses grow.</p>
</section>

<footer>
  <p>© 2026 Your Name</p>
</footer>

</body>
</html>
